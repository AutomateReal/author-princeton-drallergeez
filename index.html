<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Allergeez | Making Allergy Education Accessible</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: '#1B4332',
                        accent: '#6B5CE7',
                        highlight: '#F59E0B',
                        mint: '#F0FDF4',
                    },
                    fontFamily: {
                        heading: ['Playfair Display', 'serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            html {
                scroll-behavior: smooth;
            }
            body {
                @apply font-body text-gray-800 bg-white;
            }
            h1, h2, h3, h4 {
                @apply font-heading;
            }
        }
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .sticky-nav {
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .sticky-nav.scrolled {
            @apply bg-white shadow-md py-2;
        }
        .sticky-nav:not(.scrolled) {
            @apply bg-transparent py-4;
        }
        .sticky-nav.scrolled .nav-link {
            @apply text-forest;
        }
        .sticky-nav:not(.scrolled) .nav-link {
            @apply text-white;
        }
        /* Mobile menu fixes */
        .mobile-menu {
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'About', href: '#about' },
                { name: 'Education', href: '#education' },
                { name: 'The Book', href: '#book' },
                { name: 'Media', href: '#media' },
                { name: 'Contact', href: '#contact' },
            ];

            return (
                <nav className={`fixed w-full z-50 sticky-nav ${isScrolled ? 'scrolled' : ''}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16">
                            <div className="flex-shrink-0 flex items-center">
                                <a href="#" className="flex items-center space-x-2">
                                    <img src="logo.png" alt="Dr. Allergeez Logo" className="h-10 w-auto" />
                                    <span className={`font-heading text-xl font-bold ${isScrolled ? 'text-forest' : 'text-white'}`}>Dr. Allergeez</span>
                                </a>
                            </div>

                            {/* Desktop Menu */}
                            <div className="hidden md:block">
                                <div className="ml-10 flex items-baseline space-x-8">
                                    {navLinks.map((link) => (
                                        <a key={link.name} href={link.href} className="nav-link font-medium hover:opacity-80 transition-opacity">
                                            {link.name}
                                        </a>
                                    ))}
                                    <a href="https://secure.mypennmedicine.org/MyPennMedicine/openscheduling/standalone?vt=3802,4507&id=17566386" target="_blank" className={`px-4 py-2 rounded-full font-bold transition-all ${isScrolled ? 'bg-forest text-white' : 'bg-highlight text-white'}`}>Book Patient Appt</a>
                                </div>
                            </div>

                            {/* Mobile menu button */}
                            <div className="md:hidden flex items-center">
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className={isScrolled ? 'text-forest' : 'text-white'}>
                                    {isMenuOpen ? <i data-lucide="x"></i> : <i data-lucide="menu"></i>}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Mobile Menu */}
                    <div className={`md:hidden absolute top-0 left-0 w-full bg-white shadow-xl transform ${isMenuOpen ? 'translate-y-0' : '-translate-y-full'} transition-transform duration-300 ease-in-out z-[-1] pt-20 pb-6 px-4`}>
                        {navLinks.map((link) => (
                            <a key={link.name} href={link.href} onClick={() => setIsMenuOpen(false)} className="block py-3 text-forest font-medium border-b border-gray-100">
                                {link.name}
                            </a>
                        ))}
                        <a href="https://secure.mypennmedicine.org/MyPennMedicine/openscheduling/standalone?vt=3802,4507&id=17566386" target="_blank" className="block mt-4 text-center bg-highlight text-white py-3 rounded-xl font-bold">Book Patient Appt</a>
                    </div>
                </nav>
            );
        };

        const FadeInSection = ({ children, className = "" }) => {
            const [isVisible, setVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => setVisible(entry.isIntersecting));
                });
                observer.observe(domRef.current);
                return () => observer.unobserve(domRef.current);
            }, []);

            return (
                <div className={`fade-in ${isVisible ? 'visible' : ''} ${className}`} ref={domRef}>
                    {children}
                </div>
            );
        };

        const App = () => {
            useEffect(() => {
                lucide.createIcons();
            }, []);

            return (
                <div className="overflow-hidden">
                    <Navbar />

                    {/* Section 1: HERO */}
                    <section className="bg-forest text-white pt-32 pb-20 lg:pt-48 lg:pb-32 relative">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid lg:grid-cols-2 gap-12 items-center">
                            <FadeInSection>
                                <h1 className="text-4xl md:text-6xl font-bold leading-tight mb-6">
                                    Making Allergy Education Accessible For Everyone
                                </h1>
                                <div className="flex flex-wrap gap-4 mb-8">
                                    <div className="bg-white/10 backdrop-blur-sm border border-white/20 px-4 py-2 rounded-lg flex items-center space-x-2">
                                        <span className="text-highlight font-bold">NJAAIS</span>
                                        <span className="text-sm opacity-80">President 2024</span>
                                    </div>
                                    <div className="bg-white/10 backdrop-blur-sm border border-white/20 px-4 py-2 rounded-lg flex items-center space-x-2">
                                        <span className="text-highlight font-bold">Top Doctor</span>
                                        <span className="text-sm opacity-80">2016-2020</span>
                                    </div>
                                    <div className="bg-white/10 backdrop-blur-sm border border-white/20 px-4 py-2 rounded-lg flex items-center space-x-2">
                                        <span className="text-highlight font-bold">AAAAI</span>
                                        <span className="text-sm opacity-80">Fellow</span>
                                    </div>
                                    <div className="bg-white/10 backdrop-blur-sm border border-white/20 px-4 py-2 rounded-lg flex items-center space-x-2">
                                        <span className="text-highlight font-bold">4.9 ★</span>
                                        <span className="text-sm opacity-80">Zocdoc</span>
                                    </div>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <a href="#book" className="bg-highlight hover:bg-highlight/90 text-white px-8 py-4 rounded-full font-bold text-center transition-colors">Pre-Order Book</a>
                                    <a href="#education" className="border-2 border-white hover:bg-white hover:text-forest text-white px-8 py-4 rounded-full font-bold text-center transition-all">Learn More</a>
                                </div>
                            </FadeInSection>
                            <FadeInSection className="relative">
                                <div className="aspect-[4/5] rounded-3xl overflow-hidden shadow-2xl bg-white/5 border-8 border-white/10">

                                        {/* Since no photo provided yet, we use a styled div with avatar placeholder */}

                                            <i data-lucide="user" className="w-32 h-32 text-gray-400"></i>
                                            <p className="mt-4 text-gray-500 font-medium">Dr. Naba Sharif, MD</p>
                                        </div>
                                    </div>
                                </div>
                            </FadeInSection>
                        </div>
                    </section>

                    {/* Section 2: ABOUT */}
                    <section id="about" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid lg:grid-cols-5 gap-16 items-start">
                                <div className="lg:col-span-3">
                                    <FadeInSection>
                                        <h2 className="text-forest text-4xl font-bold mb-8">Meet Dr. Naba Sharif</h2>
                                        <div className="space-y-6 text-lg text-gray-600 leading-relaxed">
                                            <p>As a board-certified allergist and immunologist, my mission extends beyond the clinic. I believe that understanding allergies shouldn't be a source of stress for families, but rather an empowering journey of education.</p>

                                                <p className="font-bold text-xl flex items-start gap-4">
                                                    <i data-lucide="award" className="text-highlight flex-shrink-0"></i>
                                                    Elected President of the New Jersey Allergy Asthma and Immunology Society in November 2024.
                                                </p>
                                            </div>
                                            <p>With over a decade of experience, I've dedicated my career to pediatric and adult allergy care, focusing on practical, accessible, and evidence-based solutions for everyday challenges.</p>
                                        </div>
                                    </FadeInSection>
                                </div>
                                <div className="lg:col-span-2 space-y-8">
                                    <FadeInSection className="bg-mint p-8 rounded-3xl">
                                        <h3 className="text-forest text-2xl font-bold mb-6">Expertise & Background</h3>
                                        <div className="grid grid-cols-1 gap-4">
                                            {[
                                                { label: "Education", text: "Wellesley College" },
                                                { label: "Medical Degree", text: "SUNY Stony Brook MD with Distinction" },
                                                { label: "Residency", text: "Brown University" },
                                                { label: "Fellowship", text: "North Shore LIJ" },
                                                { label: "Experience", text: "Kaiser Permanente, Georgetown Preceptor" },
                                                { label: "Current", text: "10+ years at Becker ENT" },
                                                { label: "Ratings", text: "4.7 Penn Medicine, 4.9 Zocdoc" }
                                            ].map((item, id) => (
                                                <div key={id} className="bg-white p-4 rounded-xl shadow-sm">
                                                    <p className="text-xs font-bold text-accent uppercase tracking-wider mb-1">{item.label}</p>
                                                    <p className="text-forest font-medium">{item.text}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </FadeInSection>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Section 3: EDUCATION */}
                    <section id="education" className="py-24 bg-mint">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <FadeInSection>
                                    <h2 className="text-forest text-4xl font-bold mb-4">Family Allergy Education</h2>
                                    <p className="text-gray-600 max-w-2xl mx-auto">Providing clear, simplified insights into the most common allergy concerns parents face today.</p>
                                </FadeInSection>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {[
                                    { title: "Seasonal Allergies", desc: "Understanding pollen counts, common triggers, and effective management strategies for children and adults.", icon: "sun" },
                                    { title: "Food Allergies in Children", desc: "The essentials of identification, cross-contamination, and building a safe environment for your child.", icon: "apple" },

                                    { title: "Immunotherapy", desc: "Exploring long-term solutions like allergy shots and sublingual drops to build lasting tolerance.", icon: "shield-check" },
                                    { title: "Anaphylaxis & Preparedness", desc: "Critical emergency protocols, epinephrine auto-injector training, and allergy action plans for schools.", icon: "alert-circle" }
                                ].map((item, idx) => (
                                    <FadeInSection key={idx} className="bg-white p-8 rounded-3xl shadow-sm hover:shadow-md transition-shadow group">
                                        <div className="w-14 h-14 bg-mint flex items-center justify-center rounded-2xl mb-6 group-hover:bg-forest group-hover:text-white transition-colors duration-300">
                                            <i data-lucide={item.icon}></i>
                                        </div>
                                        <h3 className="text-forest text-xl font-bold mb-4">{item.title}</h3>
                                        <p className="text-gray-600 leading-relaxed">{item.desc}</p>
                                    </FadeInSection>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Section 4: THE BOOK */}
                    <section id="book" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="bg-accent rounded-3xl overflow-hidden shadow-2xl flex flex-col lg:flex-row">
                                <div className="lg:w-1/2 p-12 lg:p-20 text-white flex flex-col justify-center">
                                    <FadeInSection>
                                        <span className="inline-block bg-white/20 px-4 py-1 rounded-full text-sm font-bold mb-4 uppercase tracking-widest">Coming 2026</span>
                                        <h2 className="text-4xl md:text-5xl font-bold mb-6">Learn With Dr. Allergeez Book Series</h2>
                                        <p className="text-white/80 text-lg mb-10 leading-relaxed">
                                            Designed to help kids understand their health without the fear. Join our exclusive waitlist for early access to Book 1 and special launch events.
                                        </p>
                                        <div id="ghl-book-waitlist" className="bg-white rounded-2xl p-6 min-h-[300px] flex items-center justify-center border-2 border-white/10">
                                            <div className="text-center">
                                                <i data-lucide="mail" className="w-12 h-12 text-accent mx-auto mb-4"></i>
                                                <p className="text-gray-400 font-medium">GHL Book Waitlist Form Placeholder</p>
                                                <div className="mt-4 flex gap-2">
                                                    <div className="h-2 w-2 rounded-full bg-accent/20 animate-bounce"></div>
                                                    <div className="h-2 w-2 rounded-full bg-accent/40 animate-bounce delay-100"></div>
                                                    <div className="h-2 w-2 rounded-full bg-accent/60 animate-bounce delay-200"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </FadeInSection>
                                </div>
                                <div className="lg:w-1/2 bg-forest p-12 lg:p-20 flex items-center justify-center bg-opacity-95 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-accent/10 rounded-full -mr-32 -mt-32"></div>
                                    <div className="absolute bottom-0 left-0 w-64 h-64 bg-highlight/10 rounded-full -ml-32 -mb-32"></div>
                                    <FadeInSection>
                                        <div className="w-64 md:w-80 aspect-[3/4] bg-white rounded-lg shadow-2xl transform rotate-3 relative overflow-hidden flex flex-col items-center justify-center p-8 text-center border-4 border-white/20">
                                            <div className="absolute inset-0 bg-forest opacity-10"></div>
                                            <i data-lucide="book-open" className="w-20 h-20 text-accent mb-6"></i>
                                            <h3 className="text-forest text-2xl font-bold leading-tight">Dr. Allergeez Book 1 Title</h3>
                                            <div className="mt-4 py-2 px-4 bg-mint text-forest text-sm font-bold rounded-lg border-2 border-forest/5">Coming Soon 2026</div>
                                        </div>
                                    </FadeInSection>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Section 5: MEDIA */}
                    <section id="media" className="py-24 bg-white relative">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
                                <FadeInSection className="max-w-2xl">
                                    <h2 className="text-forest text-4xl font-bold mb-4">Media & Speaking</h2>
                                    <p className="text-gray-600 text-lg">Dr. Sharif is available for expert commentary and speaking engagements centered on family health and allergy literacy.</p>
                                </FadeInSection>
                                <FadeInSection>
                                    <div className="bg-forest p-8 rounded-3xl text-white shadow-xl hover:scale-105 transition-transform cursor-pointer">
                                        <div className="flex items-center space-x-4 mb-4">
                                            <div className="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center">
                                                <i data-lucide="download" className="text-white"></i>
                                            </div>
                                            <h3 className="text-xl font-bold">Press Kit</h3>
                                        </div>
                                        <p className="text-white/60 text-sm">Download official bios, photos, and media credentials.</p>
                                    </div>
                                </FadeInSection>
                            </div>
                            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {[
                                    { title: "Podcasts", icon: "mic" },
                                    { title: "Keynotes", icon: "presentation" },
                                    { title: "School Talks", icon: "school" },
                                    { title: "Expert Commentary", icon: "message-square" },
                                    { title: "Book Launch Events", icon: "calendar" },
                                    { title: "Workshops", icon: "users" }
                                ].map((item, idx) => (
                                    <FadeInSection key={idx} className="border-2 border-mint p-6 rounded-2xl flex items-center space-x-4 hover:border-accent transition-colors">
                                        <div className="w-10 h-10 bg-mint rounded-lg flex items-center justify-center text-forest">
                                            <i data-lucide={item.icon}></i>
                                        </div>
                                        <span className="font-bold text-forest">{item.title}</span>
                                    </FadeInSection>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Section 6: CONTACT */}
                    <section id="contact" className="py-24 bg-mint border-y border-forest/5">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid lg:grid-cols-2 gap-16">
                                <FadeInSection className="space-y-12">

                                            <i data-lucide="stethoscope" className="text-highlight"></i>
                                            Medical Patient Booking

                            <FadeInSection>
